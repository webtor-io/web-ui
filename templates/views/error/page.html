{{ define "title" }}Webtor.io{{ end }}
{{ define "main" }}
<section class="min-h-[70vh] flex flex-col items-center justify-center text-center px-6 py-24">
    <div class="max-w-[520px] relative z-10">
        <div class="font-logo text-[clamp(2.6rem,7vw,4rem)] font-light tracking-tight leading-none mb-8">web<span class="text-w-pink">tor</span></div>
        <h1 class="text-[clamp(1.5rem,4vw,2.2rem)] font-extrabold tracking-tight leading-tight mb-6">{{ t $.Lang $.ErrKey }}</h1>
        <a href="{{ langPath $.Lang "/" }}" data-async-target="main" class="btn btn-pink">{{ t $.Lang "error.back_home" }}</a>
    </div>
</section>
{{ end }}
