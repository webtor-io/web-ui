{{ define "library/rate_modal" }}
{{ if .RateForm }}
<dialog class="modal" open>
    <div class="modal-box max-w-sm bg-w-card border border-w-line/50 rounded-2xl">
        <div class="flex flex-col items-center pt-2 pb-3 gap-1">
            <div class="rating rating-md gap-0.5" id="lib-rate-stars">
                {{ range $i := seq 1 10 }}
                <input type="radio" name="lib-rating" value="{{ $i }}"
                       class="mask mask-star-2 bg-yellow-400"
                       {{ if eq $.RateForm.CurrentRating $i }}checked{{ end }} />
                {{ end }}
            </div>
            <span id="lib-rate-label" class="text-sm font-semibold text-yellow-400 h-5">{{ if gt .RateForm.CurrentRating 0 }}{{ .RateForm.CurrentRating }}/10{{ end }}</span>
        </div>
        <div class="modal-action mt-0 justify-center">
            <form action="/library/{{ .RateForm.Type }}/{{ .RateForm.VideoID }}/rate" method="post"
                  data-async-target="main" data-async-no-scroll="true" data-async-push-state="false">
                <input type="hidden" name="rating" value="{{ .RateForm.CurrentRating }}" id="lib-rate-value" />
                <button type="submit" class="btn btn-soft">
                    Rate
                </button>
            </form>
            {{ if gt .RateForm.CurrentRating 0 }}
            <form action="/library/{{ .RateForm.Type }}/{{ .RateForm.VideoID }}/unrate" method="post"
                  data-async-target="main" data-async-no-scroll="true" data-async-push-state="false">
                <button type="submit" class="btn btn-ghost text-w-sub">
                    Drop
                </button>
            </form>
            {{ end }}
            <form method="dialog">
                <button class="btn btn-ghost border border-w-line text-w-sub hover:border-w-pink hover:text-base-content">Cancel</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
<script>
(function() {
    var stars = document.querySelectorAll('#lib-rate-stars input[name="lib-rating"]');
    var hidden = document.getElementById('lib-rate-value');
    var label = document.getElementById('lib-rate-label');
    var selected = {{ .RateForm.CurrentRating }};

    function paint(upTo, bright, dim) {
        for (var i = 0; i < stars.length; i++) {
            stars[i].style.opacity = (i + 1) <= upTo ? bright : dim;
        }
    }

    function paintHover(upTo) {
        for (var i = 0; i < stars.length; i++) {
            if (i + 1 <= upTo) {
                stars[i].style.opacity = (i + 1) === upTo ? '1' : '0.7';
            } else {
                stars[i].style.opacity = '0.25';
            }
        }
    }

    function showLabel(val) {
        label.textContent = val > 0 ? val + '/10' : '';
    }

    paint(selected, '1', '0.25');

    for (var i = 0; i < stars.length; i++) {
        stars[i].addEventListener('change', function() {
            selected = parseInt(this.value);
            hidden.value = selected;
            paint(selected, '1', '0.25');
            showLabel(selected);
        });
        stars[i].addEventListener('mouseenter', function() {
            var val = parseInt(this.value);
            paintHover(val);
            showLabel(val);
        });
    }
    document.getElementById('lib-rate-stars').addEventListener('mouseleave', function() {
        paint(selected, '1', '0.25');
        showLabel(selected);
    });
})();
</script>
{{ end }}
{{ end }}
