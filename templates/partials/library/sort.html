{{ define "library/sort"}}
<form action="{{ langPath $.Ctx.Lang $.Ctx.Path }}" data-async-target="#list">
    <select class="select select-sm bg-base-300 border-w-line focus:border-w-purple focus:outline-none" name="sort" onchange="this.nextElementSibling.click()">
        {{ range $.Data | makeSort }}
            <option class="capitalize" value="{{ .Value }}" {{if .Selected }}selected{{end}}>{{ t $.Ctx.Lang .Title }}</option>
        {{ end }}
    </select>
    <button type="submit" class="hidden">Submit</button>
</form>
{{ end }}
