{{ define "discover_cta" }}
<div class="max-w-[1100px] mx-auto">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5 sm:gap-8 p-6 sm:p-8 rounded-2xl border border-w-pink/25 bg-gradient-to-r from-w-pink/10 via-base-300 to-w-purple/10">
        <a href="{{ langPath .Ctx.Lang "/discover" }}" data-async-target="main" data-umami-event="discover-cta-click" data-umami-event-page="{{ if .Data }}{{ .Data.Url }}{{ else }}home{{ end }}" class="btn btn-lg btn-pink gap-2 px-8 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.448 14.9 14.9 0 0 1 .06-.312m-2.24 2.39a4.493 4.493 0 0 0-1.757 4.306 4.493 4.493 0 0 0 4.306-1.758M16.5 9a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z" />
            </svg>
            {{ t .Ctx.Lang "tool.discoverCta.button" }}
        </a>
        <div class="min-w-0 flex-1">
            <div class="text-base font-semibold mb-1">{{ t .Ctx.Lang "tool.discoverCta.title" }}</div>
            <div class="text-[0.92rem] text-w-sub leading-relaxed">{{ t .Ctx.Lang "tool.discoverCta.text" }}</div>
        </div>
    </div>
</div>
{{ end }}
